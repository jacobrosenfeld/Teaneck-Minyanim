name: Deploy to prod

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Deploy
        env:
          KEY: ${{ secrets.DEPLOY_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          echo "$KEY" > /tmp/key && chmod 600 /tmp/key
          scp -i /tmp/key -o StrictHostKeyChecking=no \
            target/*.jar deploy@$HOST:/opt/teaneck/prod/app-new.jar
          ssh -i /tmp/key -o StrictHostKeyChecking=no deploy@$HOST "
            mv /opt/teaneck/prod/app-new.jar /opt/teaneck/prod/app.jar &&
            sudo systemctl restart teaneck-prod
          "

      - name: Health check
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          sleep 20
          ssh -i /tmp/key -o StrictHostKeyChecking=no deploy@$HOST \
            "curl --fail --retry 5 --retry-delay 5 http://localhost:8080/actuator/health"
