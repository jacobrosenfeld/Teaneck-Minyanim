name: Deploy to dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Deploy
        env:
          KEY: ${{ secrets.DEPLOY_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          echo "$KEY" > /tmp/key && chmod 600 /tmp/key
          scp -i /tmp/key -o StrictHostKeyChecking=no \
            target/*.jar deploy@$HOST:/opt/teaneck/dev/app-new.jar
          ssh -i /tmp/key -o StrictHostKeyChecking=no deploy@$HOST "
            mv /opt/teaneck/dev/app-new.jar /opt/teaneck/dev/app.jar &&
            sudo systemctl restart teaneck-dev
          "

      - name: Health check
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          sleep 20
          curl --fail --retry 5 --retry-delay 5 \
            http://$HOST:8081/actuator/health
