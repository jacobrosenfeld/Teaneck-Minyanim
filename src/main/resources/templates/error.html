<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <title th:text="|${errorCode} - ${siteName ?: 'Minyanim Platform'}|">Error</title>
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
    <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">
    <link rel="manifest" href="/assets/icons/site.webmanifest">
    <link rel="mask-icon" href="/assets/icons/safari-pinned-tab.svg" color="#275ed8">
    <meta name="msapplication-TileColor" content="#275ed8">
    <meta name="msapplication-config" content="/assets/icons/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-itunes-app"
          th:if="${appleSmartAppBannerContent != null and !#strings.isEmpty(appleSmartAppBannerContent)}"
          th:attr="content=${appleSmartAppBannerContent}">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
        crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,500,600,700" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/ionicons.min.css">
    <link href="/assets/css/style.css" rel="stylesheet" type="text/css" media="all" />
</head>

<body>
    <div class="wrapper">
        <div id="wrapper" class="horizontal-container d-flex container-md">
            <th:block th:include="~{frontnavbar}"></th:block>
            <div class="container-fluid" id="main">
                <div class="row" style="flex-direction: column;">
                    <main class="col main pt-5 mt-4 overflow-auto" style="flex-shrink: 3; padding-bottom: 65px !important;">
                        <div class="container">
                            <div class="row justify-content-center">
                                <div class="col-md-8 col-xl-6 text-center" style="padding: 5rem 1rem;">
                                    <div style="font-size: 6rem; font-weight: 700; color: #dee2e6; line-height: 1;" th:text="${errorCode}">404</div>
                                    <h1 style="font-weight: 700; margin: 1rem 0 0.75rem;" th:text="${errorTitle}">Page Not Found</h1>
                                    <p style="font-size: 1.1rem; color: #6c757d; margin-bottom: 2rem;" th:text="${errorMessage}">
                                        The page you're looking for doesn't exist.
                                    </p>
                                    <div style="display: flex; gap: 0; justify-content: center; flex-wrap: wrap;">
                                        <a class="btn-shuls" role="button" href="/">Go to Homepage</a>
                                        <a class="btn-shuls" role="button" th:href="@{|mailto:${supportEmail ?: ''}|}">Contact Support</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            </div>
        </div>
    </div>
    <th:block th:include="~{footer}"></th:block>
    <script type="text/javascript" src="/assets/js/jquery-2.1.1.js"></script>
    <script type="text/javascript" src="/assets/js/plugins.js"></script>
    <script type="text/javascript" src="/assets/js/custom.js"></script>
</body>
</html>
